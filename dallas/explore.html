<!DOCTYPE html>
<html lang="en">
<head>
<script>
/* Theme init — runs immediately to prevent flash of wrong theme */
(function(){
  var saved = localStorage.getItem('dallas2026-theme');
  var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  var useDark = saved ? saved === 'dark' : prefersDark;
  if (!useDark) document.documentElement.classList.add('light');
})();
</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Dallas — Dallas 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.nbh-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:var(--border)}
.nbh-card{background:var(--card);padding:1.75rem;position:relative;overflow:hidden;transition:background .18s}
.nbh-card:hover{background:var(--card2)}
.nbh-icon{font-size:2rem;margin-bottom:.9rem;display:block}
.nbh-tag{display:inline-block;font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  background:rgba(245,168,0,.1);color:var(--white);border:1px solid rgba(245,168,0,.25);padding:2px 8px;margin-bottom:.6rem}
.nbh-name{font-family:var(--fh);font-weight:700;font-size:1.15rem;text-transform:uppercase;margin-bottom:.4rem;letter-spacing:.02em}
.nbh-desc{font-size:.8rem;color:var(--muted);line-height:1.65;font-weight:300;margin-bottom:1.1rem}
.nbh-link{font-family:var(--fh);font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--white);text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:gap .15s}
.nbh-link:hover{gap:9px}
.rest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.rest-card{background:var(--card);border:1px solid var(--border);padding:1.4rem;
  transition:border-color .18s,transform .15s;text-decoration:none;display:block;color:inherit}
.rest-card:hover{border-color:rgba(245,168,0,.35);transform:translateY(-3px)}
.rc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.4rem}
.rc-name{font-family:var(--fh);font-weight:700;font-size:1rem;text-transform:uppercase;letter-spacing:.02em}
.rc-stars{color:var(--white);font-size:.75rem}
.rc-cuisine{font-size:.7rem;color:var(--white);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.35rem}
.rc-area{font-size:.68rem;color:var(--dim);margin-bottom:.5rem}
.rc-desc{font-size:.78rem;color:var(--muted);line-height:1.6;font-weight:300;margin-bottom:.75rem}
.rc-tags{display:flex;gap:6px;flex-wrap:wrap}
.rc-tag{font-size:.6rem;background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--dim);padding:2px 6px;font-weight:500;letter-spacing:.04em}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:2rem;overflow-x:auto}
.tab{font-family:var(--fh);font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);border:none;background:none;padding:11px 18px;cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab.active,.tab:hover{color:var(--white);border-color:var(--white)}
</style>
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
</head>
<body>
<div id="affiliate-disclosure"></div>
<nav id="main-nav"></nav>

<div class="page-hero" style="margin-top:56px">
  <div class="page-hero-bg"></div>  <!-- Texas Flag subtle overlay -->
  <div style="position:absolute;right:0;top:0;bottom:0;width:50%;pointer-events:none;z-index:0;overflow:hidden;opacity:0.06">
    <svg viewBox="0 0 900 600" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="300" height="600" fill="#002868"/>
      <rect x="300" y="0" width="600" height="300" fill="#BF0A30"/>
      <rect x="300" y="300" width="600" height="300" fill="#F0EDE8"/>
      <polygon points="150,120 163,162 207,162 172,187 185,229 150,204 115,229 128,187 93,162 137,162" fill="#F0EDE8"/>
    </svg>
  </div>
  <div class="page-hero-content">
    <div class="sec-label" data-i18n="explore_beyond">Beyond the Stadium</div>
    <h1 id="exp-h1" style="font-family:var(--fh);font-weight:900;font-size:clamp(2.5rem,7vw,5rem);line-height:.9;text-transform:uppercase;margin-bottom:1rem">Explore Dallas</h1>
    <p id="exp-sub" style="font-size:1rem;color:var(--muted);line-height:1.75;max-width:560px;font-weight:300">Dallas is a city of neighborhoods, each with its own personality. Here's how to find the real city — not just the stadium.</p>
  </div>
</div>

<section id="neighborhoods">
  <div class="sec-label" id="exp-nbh-label">Six Areas to Know</div>
  <div class="sec-title" id="exp-nbh-title">Neighborhoods</div>
  <div class="tab-bar" id="nbh-tabs">
    <button class="tab active" onclick="filterNbh(event,'all')" id="exp-tab-all">All Areas</button>
    <button class="tab" onclick="filterNbh(event,'food')" id="exp-tab-food">Food & Drink</button>
    <button class="tab" onclick="filterNbh(event,'nightlife')" id="exp-tab-night">Nightlife</button>
    <button class="tab" onclick="filterNbh(event,'culture')" id="exp-tab-culture">Culture</button>
  </div>
  <div class="nbh-grid" id="nbh-grid"></div>
</section>

<section style="background:var(--mid)" id="restaurants">
  <div class="sec-label" data-i18n="local_favorites">Local Favorites</div>
  <div class="sec-title" id="exp-rest-title">Where to Eat</div>
  <div class="tab-bar" id="rest-tabs">
    <button class="tab active" onclick="filterRest(event,'all')" id="rest-tab-all">All</button>
    <button class="tab" onclick="filterRest(event,'bbq')" id="rest-tab-bbq">BBQ</button>
    <button class="tab" onclick="filterRest(event,'texmex')" id="rest-tab-tex">Tex-Mex</button>
    <button class="tab" onclick="filterRest(event,'international')" id="rest-tab-intl">International</button>
    <button class="tab" onclick="filterRest(event,'halal')" id="rest-tab-bar">Halal</button>
  </div>
  <div class="rest-grid" id="rest-grid"></div>
  <div id="explore-ubereats" style="margin-top:1.5rem;border:1px solid var(--border)"></div>
</section>

<section style="background:var(--mid)"><div id="explore-booking"></div></section>
<section style="padding:3rem 2rem;background:var(--mid)">
  <div id="viator-tours-explore"></div>
</section>
<footer id="main-footer"></footer>
<script src="js/site.js"></script>
<script src="js/affiliate.js"></script>
<script>
renderNav(); renderFooter(); renderDisclosure(); initLang();

// Neighborhoods
function filterNbh(e, cat) {
  document.querySelectorAll('#nbh-tabs .tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  document.querySelectorAll('#nbh-grid .nbh-card').forEach(c => {
    c.style.display = (cat === 'all' || c.dataset.cat.includes(cat)) ? '' : 'none';
  });
}

function renderNbh() {
  const nbhGrid = document.getElementById('nbh-grid');
  if (!nbhGrid) return;
  const exploreLabel = t('exp_explore_link') || 'Explore';
  nbhGrid.innerHTML = NEIGHBORHOODS.map(n => `
    <div class="nbh-card" data-cat="${n.cats.join(' ')}">
      <span class="nbh-icon">${n.icon}</span>
      <div class="nbh-tag">${n.tag}</div>
      <div class="nbh-name">${n.name}</div>
      <p class="nbh-desc">${n.desc}</p>
      <a href="neighborhoods/${n.slug}.html" class="nbh-link">${exploreLabel} ${n.name} →</a>
    </div>`).join('');
}
renderNbh();

// Restaurants
let restCat = 'all';
function filterRest(e, cat) {
  restCat = cat;
  document.querySelectorAll('#rest-tabs .tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  renderRestaurants();
}
function renderRestaurants() {
  const grid = document.getElementById('rest-grid');
  const visible = RESTAURANTS.filter(r => restCat === 'all' || r.cat === restCat);
  grid.innerHTML = visible.map(r => `
    <a href="restaurants/${r.slug}.html" class="rest-card">
      <div class="rc-head"><div class="rc-name">${r.name}</div><div class="rc-stars">${stars(r.stars)}</div></div>
      <div class="rc-cuisine">${r.cuisine}</div>
      <div class="rc-area">📍 ${r.area} · ${r.price}</div>
      <div class="rc-desc">${r.desc}</div>
      <div class="rc-tags">${r.tags.map(t => `<span class="rc-tag">${t}</span>`).join('')}</div>
    </a>`).join('');
}
renderRestaurants();

// Uber Eats banner in the Where to Eat section
renderUberEatsCard('explore-ubereats', 'Dallas Restaurants', 'restaurants Dallas TX');

function updateExploreLang() {
  // Static text elements
  const ids = {
    'exp-h1':        'exp_title',
    'exp-sub':       'exp_sub',
    'exp-nbh-label': 'exp_nbh_label',
    'exp-nbh-title': 'exp_nbh_title',
    'exp-rest-title':'exp_rest_title',
  };
  Object.entries(ids).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) el.textContent = t(key);
  });
  // data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const val = t(el.getAttribute('data-i18n'));
    if (val) el.textContent = val;
  });
  // Tab buttons
  const tabMap = {
    'exp-tab-all': 'exp_tabs_all', 'exp-tab-food': 'exp_tabs_food',
    'exp-tab-night': 'exp_tabs_night', 'exp-tab-culture': 'exp_tabs_culture',
    'rest-tab-all': 'exp_rest_all', 'rest-tab-bbq': 'exp_rest_bbq',
    'rest-tab-tex': 'exp_rest_tex', 'rest-tab-intl': 'exp_rest_intl',
    'rest-tab-bar': 'exp_rest_bar',
  };
  Object.entries(tabMap).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) el.textContent = t(key);
  });
  // Re-render cards
  renderRestaurants();
  renderNbh();
}
document.addEventListener('langchange', updateExploreLang);
if (currentLang !== 'en') updateExploreLang();

// Scroll to restaurants if hash
if (window.location.hash === '#restaurants') {
  setTimeout(() => document.getElementById('restaurants').scrollIntoView({behavior:'smooth'}), 200);
}
</script>
</body>
</html>
<script>
(function(){
  // Add booking section to explore page
  const el = document.getElementById('explore-booking');
  if(el) renderViatorFoodTours('viator-tours-explore');
renderBookingSection('explore-booking', {
    title:'Plan Your Dallas Stay',
    subtitle:'Book hotels, flights, and rental cars for the World Cup. Prices rise fast as June approaches.',
    showHotels:true, showFlights:true, showCars:true, showBus:true, showTuro:false, showActivities:true,
    hotelLocation:'Dallas Texas',
  });
})();
</script>
