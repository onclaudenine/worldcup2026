    <h3 class="sec-label" data-i18n="grp_label">Travelling Together</h3>
    <h1 style="font-family:var(--fh);font-weight:900;font-size:clamp(2.2rem,6vw,4.5rem);line-height:.92;text-transform:uppercase;margin-bottom:.75rem" data-i18n="grp_title">Group Travel Guide</h1>
    <p class="page-hero-sub" id="grp-hero-sub" data-i18n="groups_hero_sub">Travelling with a supporters club or a group of 10+? Groups have different logistics — hotel blocks, group transport, ticket coordination, and finding each other in a 105,000-seat stadium. Here's everything you need.</p>

<section style="background:var(--mid)">
  <h3 class="sec-label" data-i18n="grp_accom_label">Group Accommodation</h3>
  <h2 class="sec-title" data-i18n="grp_accom_title">Staying Together as <em>a Group</em></h2>
  <div id="grp-accom-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:1.5rem">
    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Hotel room blocks</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">For groups of 10+ rooms, contact hotels directly to enquire about group rates. Marriott, Hilton, and Hyatt all have group sales teams. Book well in advance.</div></div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">VRBO for large groups</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">A large VRBO house fits 8–16 people for significantly less per person than hotels. Uptown Dallas and Las Colinas have excellent options with pools.</div></div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Spread across nearby cities</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Large supporters clubs split accommodation across Dallas, Arlington and Fort Worth. Coordinate a central meeting point for match days.</div></div>
  </div>
</section>

<section>
  <h3 class="sec-label" data-i18n="grp_transport_label">Getting to the Stadium</h3>
  <h2 class="sec-title" data-i18n="grp_transport_title">Group Transport to <em>AT&T Stadium</em></h2>
  <div id="grp-trans-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:1.5rem">
    <div style="background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gold);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem">TRE Train — best for groups</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Runs from downtown Dallas to CentrePort on match days with free FIFA shuttles. Cheap ($2.50), reliable, the whole group rides together.</div></div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Charter coach</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">For groups of 40+. Costs roughly $400–800 for a round trip. Book in advance and agree on pickup times including post-match.</div></div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Rideshare convoy</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">For groups of 8–20, book multiple Ubers simultaneously. Set a designated pickup point and have everyone request 30 minutes before departure.</div></div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Parking carpool</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Groups with rental cars can carpool to reduce costs. Official parking is $30–60 per vehicle. Book passes in advance through the stadium website.</div></div>
  </div>
</section>

<section style="background:var(--mid)">
  <h3 class="sec-label" data-i18n="grp_meet_label">Finding Each Other</h3>
  <h2 class="sec-title" data-i18n="grp_meet_title">Meeting Points & <em>Communication</em></h2>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:1.5rem;max-width:780px">
    <div>
      <div id="grp-before-match-label" style="font-family:var(--fh);font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)">Before the match</div>
      <div id="grp-meet-left" style="display:flex;flex-direction:column;gap:10px">
        <div style="font-size:.8rem;color:var(--muted);font-weight:300;line-height:1.6"><strong style="color:var(--text)">Designate a meeting point</strong> outside AT&T Stadium before you enter — once inside, mobile signal is poor. Agree on Gate A, B, C etc.</div>
        <div style="font-size:.8rem;color:var(--muted);font-weight:300;line-height:1.6"><strong style="color:var(--text)">WhatsApp group</strong> with all travellers. Share hotel addresses, ticket info, and match day plans.</div>
        <div style="font-size:.8rem;color:var(--muted);font-weight:300;line-height:1.6"><strong style="color:var(--text)">US SIM or eSIM</strong> — everyone in the group needs a US number with data. US Mobile eSIM is the easiest option.</div>
      </div>
    </div>
    <div>
      <div id="grp-meetup-spots-label" style="font-family:var(--fh);font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)">Best group meetup spots</div>
      <div id="grp-meet-right" style="display:flex;flex-direction:column;gap:10px">
        <div style="font-size:.8rem;color:var(--muted);font-weight:300;line-height:1.6">The Rustic, Uptown — massive outdoor venue, handles large groups well. Great pre-match atmosphere with big screens.</div>
        <div style="font-size:.8rem;color:var(--muted);font-weight:300;line-height:1.6">Klyde Warren Park — free outdoor park in downtown Dallas. Large open space, food trucks, easy for a group to gather.</div>
        <div style="font-size:.8rem;color:var(--muted);font-weight:300;line-height:1.6">FIFA Fan Festival — the natural gathering point for supporters of all nations.</div>
      </div>
    </div>
  </div>
</section>

  <p id="grp-clubs-intro" style="font-size:.88rem;color:var(--muted);font-weight:300;line-height:1.75;max-width:640px;margin-bottom:1.5rem">Most national team supporters clubs organise group travel packages, ticket ballots, and meetup events during major tournaments. Connect with yours before you travel.</p>

    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">La Albiceleste (Argentina)</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Argentine supporters expected in huge numbers as defending champions. Dallas has an established Argentine community. Social media groups organise pre-match asados.</div></div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Torcida (Brazil)</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Brazilian fans bring some of the tournament's best atmosphere. Large Brazilian community in DFW. Check official Torcida Brasil channels for organised events.</div></div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">American Outlaws (USA)</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">The US national team supporters club has active chapters in Dallas-Fort Worth. americanoutlaws.com — find the DFW chapter for local meetup events.</div></div>
  </div>
</section>
