<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){var s=localStorage.getItem('dallas2026-theme');var d=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;if(s?s==='light':!d)document.documentElement.classList.add('light');})();
</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dallas World Cup 2026 Match Day Checklist — 35 Things to Do Before You Go</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.cl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.cl-group{background:var(--card);border:1px solid var(--border);padding:1.5rem}
.cl-group-title{font-family:var(--fh);font-weight:700;font-size:.95rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1rem}
.cl-items{display:flex;flex-direction:column;gap:4px}
.prog-bar-wrap{background:var(--card);border:1px solid var(--border);padding:1.1rem 1.4rem;display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.prog-bar{flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden;min-width:80px}
.prog-fill{height:100%;background:var(--white);border-radius:2px;transition:width .3s}
.prog-num{font-family:var(--fh);font-size:1.4rem;font-weight:900;color:var(--white);white-space:nowrap}
</style>
<link rel="icon" type="image/svg+xml" href="./favicon.svg">

  gtag('js', new Date());
  gtag('config', 'G-R35LTLLC4L');
</script>
</head>
<body>
<div id="affiliate-disclosure"></div>
<nav id="main-nav"></nav>
<div class="page-hero" style="margin-top:56px">
  <div class="page-hero-bg"></div>
  <div style="position:absolute;right:0;top:0;bottom:0;width:50%;pointer-events:none;z-index:0;overflow:hidden;opacity:0.06">
    <svg viewBox="0 0 900 600" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="300" height="600" fill="#002868"/><rect x="300" y="0" width="600" height="300" fill="#BF0A30"/><rect x="300" y="300" width="600" height="300" fill="#F0EDE8"/>
      <polygon points="150,120 163,162 207,162 172,187 185,229 150,204 115,229 128,187 93,162 137,162" fill="#F0EDE8"/>
    </svg>
  </div>
  <div class="page-hero-content" style="position:relative;z-index:2">
    <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><span style="color:var(--text)" id="cl-page-label">Interactive Tool</span></div>
    <h1 id="cl-page-title" style="font-family:var(--fh);font-weight:900;font-size:clamp(2.5rem,7vw,5rem);line-height:.9;text-transform:uppercase;margin-bottom:1rem">Match Day Checklist</h1>
    <p class="page-hero-sub" id="cl-page-sub" data-i18n="checklist_hero_sub">35 things to have sorted before you head to AT&T Stadium. Check them off as you go — progress saves in your browser.</p>
  </div>
</div>

<section>
  <div class="prog-bar-wrap">
    <div style="flex:1">
      <div style="font-family:var(--fh);font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem" id="cl-prog-label">Your Progress</div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="prog-num"><span id="prog-done">0</span>/<span id="prog-total">0</span> <span style="font-size:.8rem;font-weight:400;color:var(--muted)" id="cl-done-word">done</span></div>
    <button class="btn-ghost" id="cl-reset-btn" onclick="clReset()">Reset</button>
  </div>
  <div class="cl-grid" id="cl-grid"></div>
</section>

<footer id="main-footer"></footer>
