<section style="background:var(--mid)">
  <h3 class="sec-label" data-i18n="acc_decision_label">The Big Decision</h3>
  <h2 class="sec-title" data-i18n="acc_decision_title">Arlington vs Dallas vs <em>Fort Worth</em></h2>
  <div id="acc-areas" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2px;background:var(--border);margin-top:1.5rem">

    <div style="background:var(--card);padding:1.5rem;border-top:3px solid var(--red)">
      <div style="font-family:var(--fh);font-size:1.3rem;font-weight:900;text-transform:uppercase;margin-bottom:.2rem"><span data-i18n="acc_arlington_title">Arlington</span></div>
      <div style="font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-bottom:1rem">Walking distance to stadium</div>
      <div style="font-size:.8rem;color:var(--muted);font-weight:300;line-height:1.75;margin-bottom:1rem">The most convenient option if you're attending multiple matches. Walk or short Uber to AT&T Stadium. Limited nightlife and restaurant options compared to Dallas, but you won't be spending money on transport.</div>
      <div style="font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text);margin-bottom:.4rem">Best for</div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.6">Attending 3+ matches · Groups who want to walk to the stadium · Avoiding match-day transport chaos</div>
      <div style="border-top:1px solid var(--border);margin-top:1rem;padding-top:1rem">

        <div style="font-size:.82rem;color:var(--muted);font-weight:300">$150–350/night during match days · Books out fast — reserve now</div>

    <div style="background:var(--card);padding:1.5rem;border-top:3px solid var(--gold)">
      <div style="font-family:var(--fh);font-size:1.3rem;font-weight:900;text-transform:uppercase;margin-bottom:.2rem"><span data-i18n="acc_dallas_title">Downtown Dallas</span></div>
      <div style="font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem">Best all-round choice</div>
      <div style="font-size:.8rem;color:var(--muted);font-weight:300;line-height:1.75;margin-bottom:1rem">The best balance of access and experience. DART to the stadium (TRE + shuttle), plus full access to Dallas's restaurants, fan zones, and nightlife. Uptown and Deep Ellum are both walkable.</div>
      <div style="font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text);margin-bottom:.4rem">Best for</div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.6">First-time visitors · Exploring Dallas culture · Fan zones · Mix of matches and sightseeing</div>
      <div style="border-top:1px solid var(--border);margin-top:1rem;padding-top:1rem">
        <div style="font-size:.72rem;font-weight:700;color:var(--text);margin-bottom:.3rem">Price range</div>

    <div style="background:var(--card);padding:1.5rem;border-top:3px solid rgba(248,244,239,0.3)">
      <div style="font-family:var(--fh);font-size:1.3rem;font-weight:900;text-transform:uppercase;margin-bottom:.2rem"><span data-i18n="acc_fw_title">Fort Worth</span></div>
      <div style="font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem">Budget-friendly, charming</div>
      <div style="font-size:.8rem;color:var(--muted);font-weight:300;line-height:1.75;margin-bottom:1rem">Often overlooked but genuinely great. 30 minutes to the stadium, much cheaper hotels, and the Fort Worth Stockyards is one of the most unique Texas experiences available. TRE train to stadium on match days.</div>
      <div style="font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text);margin-bottom:.4rem">Best for</div>

<!-- Hotel recommendations -->
<section>
  <h3 class="sec-label" data-i18n="acc_hotels_label">Recommended Hotels</h3>
  <h2 class="sec-title" data-i18n="acc_hotels_title">Where We'd <em>Stay</em></h2>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-top:1.5rem">

    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
        <div>
          <div style="font-family:var(--fh);font-size:1.1rem;font-weight:700;text-transform:uppercase">Omni Dallas Hotel</div>
          <div style="font-size:.72rem;color:var(--muted);font-weight:300">Downtown Dallas · $$$</div>
        </div>
        <span class="tag tag-blue">Top Pick</span>
      </div>
      <p style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65;margin-bottom:.75rem">Connected by skybridge to the Kay Bailey Hutchison Convention Center. Rooftop pool, great views, and directly above DART connections. One of Dallas's finest hotels — book far in advance.</p>
      <div style="font-size:.72rem;color:var(--dim)">📍 555 S Lamar St, Dallas · <a href="https://www.omnihotels.com/hotels/dallas" target="_blank" rel="noopener" class="ext-link">omnihotels.com ↗</a></div>
    </div>

    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
        <div>
          <div style="font-family:var(--fh);font-size:1.1rem;font-weight:700;text-transform:uppercase">Marriott Courtyard Arlington</div>
          <div style="font-size:.72rem;color:var(--muted);font-weight:300">Arlington · $$</div>
        </div>
        <span class="tag">Near Stadium</span>
      </div>
      <p style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65;margin-bottom:.75rem">Within walking distance of AT&T Stadium. Clean, reliable, and the location is unbeatable for match days. Fills up months in advance — check availability now even if the tournament feels far away.</p>
      <div style="font-size:.72rem;color:var(--dim)">📍 1500 Nolan Ryan Expy, Arlington</div>
    </div>

    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
        <div>
          <div style="font-family:var(--fh);font-size:1.1rem;font-weight:700;text-transform:uppercase">The Adolphus Hotel</div>
          <div style="font-size:.72rem;color:var(--muted);font-weight:300">Downtown Dallas · $$$$</div>
        </div>
        <span class="tag">Historic Luxury</span>
      </div>
      <p style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65;margin-bottom:.75rem">Built in 1912, this is Dallas's most storied hotel. Beaux-Arts architecture, exceptional service, and a legendary bar. If you want one memorable splurge night during the tournament, this is the one.</p>
      <div style="font-size:.72rem;color:var(--dim)">📍 1321 Commerce St, Dallas · <a href="https://www.hoteladolphus.com" target="_blank" rel="noopener" class="ext-link">hoteladolphus.com ↗</a></div>
    </div>

    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
        <div>
          <div style="font-family:var(--fh);font-size:1.1rem;font-weight:700;text-transform:uppercase">Aloft Dallas Downtown</div>
          <div style="font-size:.72rem;color:var(--muted);font-weight:300">Downtown Dallas · $$</div>
        </div>
        <span class="tag">Best Value Central</span>
      </div>
      <p style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65;margin-bottom:.75rem">Modern, well-located, and reasonably priced by Dallas standards. Good common areas, reliable WiFi, and walking distance to DART. Great for younger travelers and groups.</p>
      <div style="font-size:.72rem;color:var(--dim)">📍 1033 Young St, Dallas</div>
    </div>

    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
        <div>
          <div style="font-family:var(--fh);font-size:1.1rem;font-weight:700;text-transform:uppercase">VRBO — Uptown Dallas</div>
          <div style="font-size:.72rem;color:var(--muted);font-weight:300">Uptown · $ per person</div>
        </div>
        <span class="tag">Groups of 4+</span>
      </div>
      <p style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65;margin-bottom:.75rem">For groups of 4 or more, a VRBO apartment in Uptown Dallas often works out significantly cheaper than hotel rooms. Full kitchen, more space, and the neighborhood is one of Dallas's best for dining and walkability.</p>
      <div style="font-size:.72rem;color:var(--dim)">Search Uptown, Victory Park, or Design District on VRBO</div>
    </div>

    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
        <div>
          <div style="font-family:var(--fh);font-size:1.1rem;font-weight:700;text-transform:uppercase">Hilton Fort Worth</div>
          <div style="font-size:.72rem;color:var(--muted);font-weight:300">Fort Worth · $$</div>
        </div>
        <span class="tag">Budget Smart</span>
      </div>
      <p style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65;margin-bottom:.75rem">Downtown Fort Worth, walking distance to the Stockyards. TRE train gives you direct match-day access to the stadium. Often 30–40% cheaper than equivalent Dallas hotels during the tournament.</p>
      <div style="font-size:.72rem;color:var(--dim)">📍 815 Main St, Fort Worth</div>
    </div>
  </div>
</section>

<!-- Booking tips -->
<section style="background:var(--mid)">
  <h3 class="sec-label" data-i18n="acc_tips_label">Booking Advice</h3>
  <h2 class="sec-title" data-i18n="acc_tips_title">Book Early. <em>Very Early.</em></h2>
  <div id="acc-booking-tips" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:1.5rem">
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;color:var(--red);margin-bottom:.4rem"><span data-i18n="acc_book_early_title">Book now — prices will double</span></div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Dallas hotel prices during the World Cup are already 2–3× normal rates. By the time matches start, available rooms will be scarce and prices will be extreme. Book refundable rates now and cancel later if plans change.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem"><span data-i18n="acc_free_cancel_title">Free cancellation is your friend</span></div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Book fully refundable rates even if they're slightly higher. Match schedules can shift, and having flexibility costs very little compared to being locked in. Booking.com and VRBO both offer strong cancellation options.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem"><span data-i18n="acc_checkout_title">Check checkout day carefully</span></div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Many hotels require minimum stays around match days. If you're only attending one game, look for hotels with no minimum stay requirements — or book a full week even if you plan to arrive late.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem"><span data-i18n="acc_non_match_title">Consider checking out on a non-match day</span></div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Match days have surge pricing on Uber and chaotic traffic. If possible, schedule your departure day for a quiet Tuesday or Wednesday — you'll have an easier airport journey and cheaper rideshare prices.</div>
    </div>
  </div>
  <div style="margin-top:2rem" id="accom-booking"></div>
