<section style="background:var(--mid)">
  <h3 class="sec-label" data-i18n="tkt_official_label">Official Tickets</h3>
  <h2 class="sec-title" data-i18n="tkt_official_title">Buy from <em>FIFA Direct</em></h2>
  <div id="tkt-warning" style="background:rgba(191,10,48,0.08);border-left:3px solid var(--red);padding:1rem 1.25rem;max-width:680px;margin-bottom:1.5rem;font-size:.85rem;color:var(--muted);line-height:1.75;font-weight:300">
    <strong style="color:var(--text)">Always buy official first.</strong> The only authorised source for FIFA World Cup 2026 tickets is <strong style="color:var(--text)">FIFA.com/tickets</strong>. Any other site selling "official" tickets is a third party at best and a scam at worst.
  </div>
  <div id="tkt-official-info" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1px;background:var(--border);max-width:900px;margin-bottom:2rem">
    <div style="background:var(--card);padding:1.25rem"><div class="card-label" data-i18n="lbl_official_site">Official site</div><div style="font-size:.85rem;color:var(--muted);font-weight:300"><a href="https://www.fifa.com/tickets" target="_blank" rel="noopener" class="ext-link">FIFA.com/tickets ↗</a><br>Register for a FIFA account first — required before any purchase</div></div>
    <div style="background:var(--card);padding:1.25rem"><div class="card-label" data-i18n="lbl_fifa_app">FIFA Ticketing App</div><div style="font-size:.85rem;color:var(--muted);font-weight:300">Download the official FIFA app — all tickets are digital, stored here. Required for stadium entry. Download before you travel.</div></div>
    <div style="background:var(--card);padding:1.25rem"><div class="card-label" data-i18n="lbl_sales_phases">Sales phases</div><div style="font-size:.85rem;color:var(--muted);font-weight:300">FIFA runs multiple sales phases — early ballot, general sale, and last-minute. Each phase opens on FIFA.com. Sign up for email alerts.</div></div>
    <div style="background:var(--card);padding:1.25rem"><div class="card-label" data-i18n="lbl_id_required">ID required</div><div style="font-size:.85rem;color:var(--muted);font-weight:300">Tickets are tied to your ID. At the gate you'll need your passport or ID matching the ticket name. Non-transferable without FIFA approval.</div></div>
  </div>
  <h3 class="sec-label" style="margin-bottom:.75rem" data-i18n="tkt_categories">Ticket Categories</h3>

    <div style="background:var(--card);padding:1.25rem;border-top:3px solid rgba(248,244,239,0.2)"><div style="font-family:var(--fh);font-size:1rem;font-weight:700;text-transform:uppercase;margin-bottom:.3rem">Category 4</div><div style="font-family:var(--fh);font-size:1.6rem;font-weight:900;color:var(--white);margin-bottom:.3rem">$50–80</div><div style="font-size:.72rem;color:var(--muted);font-weight:300">Restricted view or upper tier. Lowest price, limited availability. Sold first in ballot phases.</div></div>
    <div style="background:var(--card);padding:1.25rem;border-top:3px solid rgba(248,244,239,0.3)"><div style="font-family:var(--fh);font-size:1rem;font-weight:700;text-transform:uppercase;margin-bottom:.3rem">Category 3</div><div style="font-family:var(--fh);font-size:1.6rem;font-weight:900;color:var(--white);margin-bottom:.3rem">$100–150</div><div style="font-size:.72rem;color:var(--muted);font-weight:300">Upper tier with full pitch view. Best value category — good sight lines at AT&T Stadium.</div></div>
    <div style="background:var(--card);padding:1.25rem;border-top:3px solid var(--gold)"><div style="font-family:var(--fh);font-size:1rem;font-weight:700;text-transform:uppercase;margin-bottom:.3rem;color:var(--gold)">Category 2</div><div style="font-family:var(--fh);font-size:1.6rem;font-weight:900;color:var(--white);margin-bottom:.3rem">$200–350</div><div style="font-size:.72rem;color:var(--muted);font-weight:300">Lower tier, side stands. Excellent view, good atmosphere. Most popular category.</div></div>
    <div style="background:var(--card);padding:1.25rem;border-top:3px solid var(--red)"><div style="font-family:var(--fh);font-size:1rem;font-weight:700;text-transform:uppercase;margin-bottom:.3rem;color:var(--red)">Category 1</div><div style="font-family:var(--fh);font-size:1.6rem;font-weight:900;color:var(--white);margin-bottom:.3rem">$400–800</div><div style="font-size:.72rem;color:var(--muted);font-weight:300">Premium lower tier, behind goals or midfield. Best seats in the stadium. Very limited.</div></div>
    <div style="background:var(--card);padding:1.25rem;border-top:3px solid var(--red)"><div style="font-family:var(--fh);font-size:1rem;font-weight:700;text-transform:uppercase;margin-bottom:.3rem;color:var(--red)">Semifinal</div><div style="font-family:var(--fh);font-size:1.6rem;font-weight:900;color:var(--white);margin-bottom:.3rem">$400–2,000</div><div style="font-size:.72rem;color:var(--muted);font-weight:300">Dallas hosts a Semifinal (July 14). Premium pricing across all categories. Book the moment sales open.</div></div>
  </div>
</section>

<section>
  <h3 class="sec-label" data-i18n="tkt_resale_label">Resale Market</h3>
  <h2 class="sec-title" data-i18n="tkt_resale_title">If Official Tickets <em>Are Sold Out</em></h2>
  <p id="tkt-resale-intro" style="font-size:.88rem;color:var(--muted);font-weight:300;line-height:1.75;max-width:640px;margin-bottom:1.5rem">FIFA runs an official resale platform — this is the safest secondary market option. Third-party resale sites also carry World Cup tickets but with significant price premiums.</p>
  <div id="tkt-resale-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">
    <div style="background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gold);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">FIFA Official Resale</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">FIFA.com/tickets — official resale marketplace. Safest option. Tickets are verified and ID-linked. Check regularly as tickets are returned throughout the tournament.</div></div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">StubHub / Viagogo</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Expect 3–10× face value for popular matches. Prices spike as match day approaches. Buy early if using resale. Both offer buyer guarantees.</div></div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Supporters Club Allocation</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">National football associations receive ticket allocations. Join your national supporters club — Dutch, Argentine, Brazilian, and English clubs often have ticket packages for members.</div></div>
  </div>
</section>

  <h2 class="sec-title" data-i18n="tkt_scam_title">Don't Get <em>Scammed</em></h2>
  <div id="tkt-scam-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:1.5rem">
    <div style="background:var(--card);border:1px solid var(--border);border-left:3px solid var(--red);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;color:var(--red);margin-bottom:.4rem">PDF tickets are fake</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">FIFA World Cup 2026 tickets are digital only — stored in the FIFA app. Anyone selling a PDF, screenshot, or printed ticket is scamming you. Walk away immediately.</div></div>
    <div style="background:var(--card);border:1px solid var(--border);border-left:3px solid var(--red);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;color:var(--red);margin-bottom:.4rem">Bank transfer = no protection</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Never pay by bank transfer, wire, crypto, or gift cards. Use a credit card through a verified platform only — gives you chargeback rights if the ticket is invalid.</div></div>
    <div style="background:var(--card);border:1px solid var(--border);border-left:3px solid var(--red);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;color:var(--red);margin-bottom:.4rem">Social media sellers</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Facebook groups, WhatsApp, and Instagram are full of ticket scammers during major tournaments. Even if a seller looks legitimate, use only verified platforms.</div></div>
    <div style="background:var(--card);border:1px solid var(--border);border-left:3px solid var(--red);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;color:var(--red);margin-bottom:.4rem">Fake FIFA websites</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">The only real FIFA ticketing URL is fifa.com — bookmark it and type it directly. Do not click links in emails or ads claiming to sell official tickets.</div></div>
  </div>
</section>

  <h2 class="sec-title" data-i18n="tkt_stadium_title">Using Your <em>Ticket</em></h2>

    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Arrive 90 minutes early</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">AT&T Stadium is enormous. Security queues for 100,000+ people take time. Gates open 2.5 hours before kickoff. Arrive 90 minutes early to avoid missing the start.</div></div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Clear bag policy</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">AT&T Stadium enforces a strict clear bag policy. Only bags smaller than 12"×6"×12" in clear plastic, vinyl, or PVC are permitted. Small clutch bags up to 4.5"×6.5" are allowed.</div></div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem"><div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Bring photo ID</div><div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Your passport or government-issued ID must match the name on your ticket. FIFA may conduct random ID checks at the gate. Minors must be accompanied by the registered ticket holder.</div></div>
