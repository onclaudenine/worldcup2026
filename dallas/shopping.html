    <h1 style="font-family:var(--fh);font-weight:900;font-size:clamp(2.2rem,6vw,4.5rem);line-height:.92;text-transform:uppercase;margin-bottom:.75rem">Shopping in Dallas</h1>
    <p class="page-hero-sub" data-i18n="shopping_hero_sub">Dallas is a world-class shopping destination — from luxury malls and designer boutiques to Texas-made goods and outlet bargains. Many international visitors plan a shopping day as part of their World Cup trip.</p>

<!-- Main malls -->
<section style="background:var(--mid)">
  <h3 class="sec-label" data-i18n="shop_malls_label">Major Shopping Centers</h3>
  <h2 class="sec-title" data-i18n="shop_malls_title">The Big <em>Malls</em></h2>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-top:1.5rem">

    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
        <div>
          <div style="font-family:var(--fh);font-size:1.2rem;font-weight:700;text-transform:uppercase"><span data-i18n="shop_northpark">NorthPark Center</span></div>
          <div style="font-size:.72rem;color:var(--muted);font-weight:300">North Dallas · 15 min from downtown</div>
        </div>
        <span class="tag tag-blue">Top Pick</span>
      </div>
      <p style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65;margin-bottom:.75rem">Dallas's premier luxury mall. Apple, Louis Vuitton, Gucci, Nordstrom, Neiman Marcus flagship. Also a genuine art museum within the mall — hundreds of original artworks. Fully air-conditioned and beautiful to walk through even if you don't shop.</p>
      <div style="font-size:.72rem;color:var(--dim);margin-bottom:.4rem">📍 8687 N Central Expy, Dallas · DART bus accessible</div>
      <div style="font-size:.72rem;color:var(--dim)">⏰ Mon–Sat 10am–9pm · Sun 12pm–6pm</div>
    </div>

    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
        <div>
          <div style="font-family:var(--fh);font-size:1.2rem;font-weight:700;text-transform:uppercase"><span data-i18n="shop_galleria">Galleria Dallas</span></div>
          <div style="font-size:.72rem;color:var(--muted);font-weight:300">North Dallas · Near DFW Airport</div>
        </div>
        <span class="tag">Huge Selection</span>
      </div>
      <p style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65;margin-bottom:.75rem">Enormous multi-level mall with an indoor ice rink on the ground floor. Macy's, H&M, Zara, Michael Kors, and 200+ stores. Popular with international shoppers for the variety and brand selection. Good food court options.</p>
      <div style="font-size:.72rem;color:var(--dim);margin-bottom:.4rem">📍 13350 Dallas Pkwy, Dallas</div>
      <div style="font-size:.72rem;color:var(--dim)">⏰ Mon–Sat 10am–9pm · Sun 12pm–7pm</div>
    </div>

    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
        <div>
          <div style="font-family:var(--fh);font-size:1.2rem;font-weight:700;text-transform:uppercase"><span data-i18n="shop_allen">Allen Premium Outlets</span></div>
          <div style="font-size:.72rem;color:var(--muted);font-weight:300">Allen, TX · 30 min north of Dallas</div>
        </div>
        <span class="tag tag-red">Best Bargains</span>
      </div>
      <p style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65;margin-bottom:.75rem">150+ designer and name-brand outlets with 25–65% off retail prices. Nike, Adidas, Coach, Kate Spade, Polo Ralph Lauren, Saks Off Fifth. One of the best outlet malls in Texas. Requires a car or Uber (~$35–45 each way).</p>
      <div style="font-size:.72rem;color:var(--dim);margin-bottom:.4rem">📍 820 W Stacy Rd, Allen, TX</div>
      <div style="font-size:.72rem;color:var(--dim)">⏰ Mon–Sat 10am–9pm · Sun 11am–7pm</div>
    </div>

    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
        <div>
          <div style="font-family:var(--fh);font-size:1.2rem;font-weight:700;text-transform:uppercase"><span data-i18n="shop_legacy">The Shops at Legacy</span></div>
          <div style="font-size:.72rem;color:var(--muted);font-weight:300">Plano · 25 min north of Dallas</div>
        </div>
        <span class="tag">Upscale Outdoor</span>
      </div>
      <p style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65;margin-bottom:.75rem">Walkable open-air shopping and dining district in Plano. Less overwhelming than the big malls, with a great mix of restaurants, boutiques, and anchored by Whole Foods. Pleasant in the evening when temperatures cool.</p>
      <div style="font-size:.72rem;color:var(--dim);margin-bottom:.4rem">📍 7400 Windrose Ave, Plano, TX</div>
      <div style="font-size:.72rem;color:var(--dim)">⏰ Stores vary · Restaurants open late</div>
    </div>

    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
        <div>
          <div style="font-family:var(--fh);font-size:1.2rem;font-weight:700;text-transform:uppercase"><span data-i18n="shop_bishop">Bishop Arts District</span></div>
          <div style="font-size:.72rem;color:var(--muted);font-weight:300">Oak Cliff · 10 min from downtown</div>
        </div>
        <span class="tag">Indie Boutiques</span>
      </div>
      <p style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65;margin-bottom:.75rem">The best independent shopping in Dallas. Local boutiques, galleries, vintage stores, and artisan goods you won't find anywhere else. Great for unique Texas-made gifts. Combine with lunch at one of the excellent restaurants in the neighborhood.</p>
      <div style="font-size:.72rem;color:var(--dim);margin-bottom:.4rem">📍 Bishop Ave & Davis St, Oak Cliff</div>
      <div style="font-size:.72rem;color:var(--dim)">⏰ Most shops 11am–7pm · Closed Mon</div>
    </div>

    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
        <div>
          <div style="font-family:var(--fh);font-size:1.2rem;font-weight:700;text-transform:uppercase"><span data-i18n="shop_deepellum">Deep Ellum</span></div>
          <div style="font-size:.72rem;color:var(--muted);font-weight:300">Deep Ellum · Walkable from downtown</div>
        </div>
        <span class="tag">Vintage & Music</span>
      </div>
      <p style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65;margin-bottom:.75rem">Vintage clothing, record stores, tattoo studios, and music merchandise. Not traditional shopping, but great for one-of-a-kind finds. The street art alone is worth the visit. Best in the evening when the neighborhood comes alive.</p>
      <div style="font-size:.72rem;color:var(--dim);margin-bottom:.4rem">📍 Commerce & Main St, Deep Ellum</div>
      <div style="font-size:.72rem;color:var(--dim)">⏰ Afternoon through late night</div>
    </div>
  </div>
</section>

<!-- Texas souvenirs -->
<section>
  <h3 class="sec-label" data-i18n="shop_souv_label">What to Buy</h3>
  <h2 class="sec-title" data-i18n="shop_souv_title">Authentic Texas <em>Souvenirs</em></h2>
  <p style="font-size:.85rem;color:var(--muted);font-weight:300;line-height:1.75;max-width:600px;margin-bottom:2rem">Skip the airport gift shop. These are the things worth bringing home from Dallas.</p>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px">
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem">
      <div style="font-size:1.5rem;margin-bottom:.5rem">🤠</div>
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem"><span data-i18n="shop_cowboy">Resistol or Stetson Hat</span></div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">A real Texas cowboy hat from a reputable Texas hatmaker. Resistol is headquartered in Garland, TX. Available at Boot Barn or Cavender's across the DFW area. $50–500+ depending on quality.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem">
      <div style="font-size:1.5rem;margin-bottom:.5rem">👢</div>
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem"><span data-i18n="shop_boots">Texas Cowboy Boots</span></div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Boot Barn and Cavender's have hundreds of styles from $80 to $1,000+. Fort Worth Stockyards has boot shops with even more character. The real deal — handmade leather boots from Texas craftspeople.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem">
      <div style="font-size:1.5rem;margin-bottom:.5rem">🌶️</div>
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem"><span data-i18n="shop_sauce">Texas Hot Sauce & BBQ Rubs</span></div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Many Dallas BBQ restaurants sell their signature sauces and rubs. Pecan Lodge and Heim BBQ both sell bottled products. Central Market grocery stores have the best selection of small-batch Texas hot sauces.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem">
      <div style="font-size:1.5rem;margin-bottom:.5rem">🎨</div>
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem"><span data-i18n="shop_art">Texas Art & Prints</span></div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">The Bishop Arts District and Deep Ellum have galleries selling original Texas art and prints. The Nasher Sculpture Center gift shop has excellent design objects. Something you won't find at home.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem">
      <div style="font-size:1.5rem;margin-bottom:.5rem">🍫</div>
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem"><span data-i18n="shop_pecan">Texas Pecan Treats</span></div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Texas is the largest pecan-producing state in the US. Pralines, pecan brittle, and chocolate-covered pecans are excellent gifts. Available at Central Market and most specialty food stores.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem">
      <div style="font-size:1.5rem;margin-bottom:.5rem">⚽</div>
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem"><span data-i18n="shop_merch">Official Tournament Merchandise</span></div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Official FIFA merchandise stores will be at AT&T Stadium and the Fan Festival. T-shirts, scarves, balls, and collectibles. The Dallas-specific items sell out fast — buy early in the tournament.</div>
    </div>
  </div>
</section>

<!-- Tax refund note -->
<section style="background:var(--mid)">
  <h3 class="sec-label" data-i18n="shop_intl_label">International Shoppers</h3>
  <h2 class="sec-title" data-i18n="shop_intl_title">Tax & Shopping <em>Tips</em></h2>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:1.5rem">
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">No VAT refund in the US</div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Unlike Europe, the US does not offer tax refunds to international tourists on retail purchases. The 8.25% Texas sales tax is non-recoverable. Factor this into your budget.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Outlet malls need a car</div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Allen Premium Outlets and Grand Prairie Premium Outlets are not on DART. Budget $35–50 each way for Uber, or rent a car for the day. Well worth it for serious shoppers.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Pack an extra bag</div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Bring a collapsible duffle bag or buy one at the mall. US retail prices on clothing, shoes, and electronics are often 20–40% cheaper than Europe and Australia, even after the exchange rate.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.25rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Know your customs limits</div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Check your home country's customs allowances before shopping. EU residents can import €430 duty-free; UK residents £390; Australian residents AUD $900. Declare anything over the limit to avoid fines.</div>
    </div>
  </div>
</section>

<section style="background:var(--mid)">
  <h3 class="sec-label" data-i18n="related_label">Related Guides</h3>
