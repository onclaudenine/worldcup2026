    <h1 style="font-family:var(--fh);font-weight:900;font-size:clamp(2.2rem,6vw,4.5rem);line-height:.92;text-transform:uppercase;margin-bottom:.75rem">JFK Memorial &<br>Sixth Floor Museum</h1>
    <p class="page-hero-sub">One of the most significant historical sites in the United States. Dealey Plaza, the grassy knoll, and the Sixth Floor Museum — the site where President Kennedy was assassinated in 1963, preserved exactly as it was.</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem">

<section style="background:var(--mid)">
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--border);margin-bottom:2rem">
    <div style="background:var(--card);padding:1.25rem"><div class="card-label" data-i18n="lbl_address">Address</div><div style="font-size:.85rem;color:var(--muted);font-weight:300">411 Elm St, Dallas, TX 75202<br>West End Historic District</div></div>
    <div style="background:var(--card);padding:1.25rem"><div class="card-label">Museum Hours</div><div style="font-size:.85rem;color:var(--muted);font-weight:300">Daily 10am–6pm<br>Last entry 5:15pm</div></div>
    <div style="background:var(--card);padding:1.25rem"><div class="card-label">Museum Admission</div><div style="font-size:.85rem;color:var(--muted);font-weight:300">Adults $18 · Students $14<br>Dealey Plaza: Free always</div></div>
    <div style="background:var(--card);padding:1.25rem"><div class="card-label">DART</div><div style="font-size:.85rem;color:var(--muted);font-weight:300">Green/Blue Line<br>West End station — 5 min walk</div></div>
    <div style="background:var(--card);padding:1.25rem"><div class="card-label">Duration</div><div style="font-size:.85rem;color:var(--muted);font-weight:300">Museum: 1.5–2 hours<br>Plaza + surrounds: 30 min</div></div>
  </div>
  <p style="font-size:.92rem;color:var(--muted);font-weight:300;line-height:1.8;max-width:740px">Dealey Plaza in downtown Dallas is where President John F. Kennedy was shot on November 22, 1963 — one of the most significant moments in American history. The Sixth Floor Museum occupies the floor of the former Texas School Book Depository from which shots were fired, and covers Kennedy's presidency, the assassination, and its aftermath through film, photography, and artifacts. The experience is powerful, sobering, and unforgettable. For many international visitors, this is the most historically significant place they will visit in the United States.</p>
</section>

<section>
  <h3 class="sec-label" data-i18n="act_what_see">What to See</h3>
  <h2 class="sec-title" data-i18n="act_what_see">The <em>Experience</em></h2>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:1.5rem">
    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">The Sixth Floor Museum</div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">The sniper's nest is recreated exactly as it appeared in 1963. Original film footage of the motorcade, the Warren Commission report, and extensive photographic documentation of JFK's presidency and legacy. Audio guide available in multiple languages ($5). Tickets $18 adults.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Dealey Plaza — Free</div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">The outdoor plaza, the grassy knoll, the triple underpass, and the X marks on the road where Kennedy was struck are all freely accessible. Standing on the grassy knoll and seeing the motorcade route for yourself is a genuinely moving experience — no ticket needed.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">JFK Memorial Plaza</div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">One block from Dealey Plaza — a simple open cenotaph designed by Philip Johnson. A quiet, reflective memorial to JFK. Free to visit, open 24 hours. Worth the 3-minute walk from the museum.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">West End Historic District</div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">The surrounding warehouse district has excellent restaurants and bars. Combine the museum visit with lunch at the West End and a walk to Klyde Warren Park — a perfect half-day itinerary for a rest day between matches.</div>
    </div>
  </div>
</section>

    <div style="font-size:.82rem;color:var(--muted);font-weight:300;display:flex;gap:10px;line-height:1.6"><span style="color:var(--red);flex-shrink:0">→</span>The grassy knoll and Dealey Plaza are always free — visit even if you skip the museum</div>
    <div style="font-size:.82rem;color:var(--muted);font-weight:300;display:flex;gap:10px;line-height:1.6"><span style="color:var(--red);flex-shrink:0">→</span>Audio guides available in Spanish, French, German, Japanese, Portuguese — worth the extra $5</div>
    <div style="font-size:.82rem;color:var(--muted);font-weight:300;display:flex;gap:10px;line-height:1.6"><span style="color:var(--red);flex-shrink:0">→</span>DART Green/Blue Line to West End station — 5-minute walk to the museum. No need to drive or pay for parking</div>
    <div style="font-size:.82rem;color:var(--muted);font-weight:300;display:flex;gap:10px;line-height:1.6"><span style="color:var(--red);flex-shrink:0">→</span>Combine with Klyde Warren Park (15 min walk) and the Dallas Arts District for a full rest-day itinerary</div>
