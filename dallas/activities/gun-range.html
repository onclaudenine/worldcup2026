<section style="background:var(--mid)">
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--border);margin-bottom:2rem">
    <div style="background:var(--card);padding:1.25rem"><div class="card-label" data-i18n="lbl_best_for">Best Location for Visitors</div><div style="font-size:.85rem;color:var(--muted);font-weight:300">4825 S Cooper St, Arlington<br>10 min from AT&T Stadium</div></div>
    <div style="background:var(--card);padding:1.25rem"><div class="card-label" data-i18n="lbl_hours">Hours</div><div style="font-size:.85rem;color:var(--muted);font-weight:300">Mon–Fri 10am–10pm<br>Sat–Sun 9am–9pm</div></div>
    <div style="background:var(--card);padding:1.25rem"><div class="card-label" data-i18n="lbl_cost">Cost</div><div style="font-size:.85rem;color:var(--muted);font-weight:300">Lane rental + ammo: ~$40–80/person<br>Gun rental: $10–20 extra</div></div>
    <div style="background:var(--card);padding:1.25rem"><div class="card-label" data-i18n="lbl_age_req">Age requirement</div><div style="font-size:.85rem;color:var(--muted);font-weight:300">18+ for rifles/shotguns<br>21+ for handguns (without guardian)</div></div>
    <div style="background:var(--card);padding:1.25rem"><div class="card-label" data-i18n="lbl_experience">Experience needed</div><div style="font-size:.85rem;color:var(--muted);font-weight:300">None — full instruction provided<br>Beginners welcome</div></div>
  </div>
  <p style="font-size:.92rem;color:var(--muted);font-weight:300;line-height:1.8;max-width:740px">For visitors from countries where civilian firearms are restricted or banned, shooting at an American gun range is a genuinely memorable experience. Shoot Smart is one of DFW's most professional and welcoming ranges — staff provide thorough safety briefings and are experienced with first-time shooters from around the world. All safety equipment is included. An air-conditioned indoor range makes this a good option during the peak summer heat of the World Cup.</p>
</section>

<section>
  <h3 class="sec-label" data-i18n="act_what_inc">What's Included</h3>
  <h2 class="sec-title" data-i18n="act_what_see">The <em>Experience</em></h2>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:1.5rem">
    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Safety Briefing</div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Every visitor receives a full safety briefing before entering the range. Range Safety Officers are on duty at all times. This is non-negotiable and thorough — you will feel confident before picking up a firearm.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Firearms to Choose From</div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Pistols, revolvers, semi-automatic rifles (.22 to .45), and shotguns all available to rent. Staff will recommend the right option for a first-timer — typically a .22 rifle or 9mm handgun to start.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Safety Equipment</div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Ear protection and safety glasses provided and included in the range fee. Closed-toe shoes are required. No open-toed shoes or sandals permitted on the range floor.</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);padding:1.4rem">
      <div style="font-family:var(--fh);font-size:.9rem;font-weight:700;text-transform:uppercase;margin-bottom:.4rem">Your Target</div>
      <div style="font-size:.78rem;color:var(--muted);font-weight:300;line-height:1.65">Paper targets are included. At the end of your session, you can take your target home as a souvenir. A surprisingly popular memento from the uniquely American experience.</div>
    </div>
  </div>
</section>

<section style="background:var(--mid)">
  <h3 class="sec-label" data-i18n="act_important">Important Notes</h3>
  <h2 class="sec-title" data-i18n="act_before">Before You <em>Book</em></h2>
  <div style="display:flex;flex-direction:column;gap:10px;max-width:640px;margin-top:1.5rem">
    <div style="background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gold);padding:1rem 1.25rem;font-size:.82rem;color:var(--muted);font-weight:300;line-height:1.65"><strong style="color:var(--text)">Passport required.</strong> Non-US visitors must present a valid passport to rent firearms. Your driving licence from your home country is not sufficient on its own.</div>
    <div style="background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gold);padding:1rem 1.25rem;font-size:.82rem;color:var(--muted);font-weight:300;line-height:1.65"><strong style="color:var(--text)">Book a lane in advance.</strong> Shoot Smart gets busy on weekends — lanes sell out. Book online at shootsmart.com or call ahead. Walk-ins are accepted when lanes are available.</div>
    <div style="background:var(--card);border:1px solid var(--border);border-left:3px solid var(--red);padding:1rem 1.25rem;font-size:.82rem;color:var(--muted);font-weight:300;line-height:1.65"><strong style="color:var(--text)">Closed-toe shoes only.</strong> This is a strict safety rule — no exceptions. Wear trainers or any closed shoe. Sandals, flip-flops, or open-toed shoes are not permitted.</div>
    <div style="background:var(--card);border:1px solid var(--border);border-left:3px solid var(--red);padding:1rem 1.25rem;font-size:.82rem;color:var(--muted);font-weight:300;line-height:1.65"><strong style="color:var(--text)">Age restrictions.</strong> Must be 21+ to rent handguns without a guardian present. 18+ for rifles and shotguns. Valid photo ID required for all shooters.</div>
  </div>
</section>
